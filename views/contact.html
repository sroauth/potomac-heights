<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contact | Potomac Heights</title>

    <link rel="stylesheet" href="/static/css/tailwind.css" />

    <script src="/static/js/htmx.min.js" defer></script>
  </head>

  <body>
    <div id="app">
      <header hx-get="/static/html/header.html" hx-trigger="load"></header>

      <main>
        <section class="body-font relative text-gray-600">
          <div class="absolute inset-0 bg-gray-300">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6235.627784011669!2d-77.13485330132227!3d38.60715360516139!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89b7aa0a87a616db%3A0xb79b3c8b543b8a79!2sPotomac%20Heights%2C%20MD%2020640!5e0!3m2!1sen!2sus!4v1646792831409!5m2!1sen!2sus"
              width="100%"
              height="100%"
              style="border: 0; filter: grayscale(1) opacity(0.4)"
              allowfullscreen=""
              loading="lazy"
            ></iframe>
          </div>
          <div class="container mx-auto flex px-5 py-24">
            <div
              class="relative z-10 mt-10 flex w-full flex-col rounded-lg bg-white p-8 shadow-md md:ml-auto md:mt-0 md:w-1/2 lg:w-1/3"
            >
              <h2 class="title-font mb-1 text-lg font-medium text-gray-900">
                Contact Us
              </h2>
              <!-- <p class="mb-5 leading-relaxed text-gray-600">
                Post-ironic portland shabby chic echo park, banjo fashion axe
              </p> -->
              <div class="relative mb-4">
                <label for="name" class="text-sm leading-7 text-gray-600"
                  >Name</label
                >
                <input
                  type="text"
                  id="name"
                  name="name"
                  class="w-full rounded border border-gray-300 bg-white py-1 px-3 text-base leading-8 text-gray-700 outline-none transition-colors duration-200 ease-in-out focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
                />
              </div>
              <div class="relative mb-4">
                <label for="email" class="text-sm leading-7 text-gray-600"
                  >Email</label
                >
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="w-full rounded border border-gray-300 bg-white py-1 px-3 text-base leading-8 text-gray-700 outline-none transition-colors duration-200 ease-in-out focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
                />
              </div>
              <div class="relative mb-4">
                <label for="subject" class="text-sm leading-7 text-gray-600"
                  >Subject</label
                >
                <input
                  type="text"
                  id="subject"
                  name="subject"
                  class="w-full rounded border border-gray-300 bg-white py-1 px-3 text-base leading-8 text-gray-700 outline-none transition-colors duration-200 ease-in-out focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
                />
              </div>
              <div class="relative mb-4">
                <label for="message" class="text-sm leading-7 text-gray-600"
                  >Message</label
                >
                <textarea
                  id="message"
                  name="message"
                  class="h-32 w-full resize-none rounded border border-gray-300 bg-white py-1 px-3 text-base leading-6 text-gray-700 outline-none transition-colors duration-200 ease-in-out focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
                ></textarea>
              </div>
              <button
                class="rounded border-0 bg-indigo-500 py-2 px-6 text-lg text-white hover:bg-indigo-600 focus:outline-none"
              >
                Send message
              </button>
              <!-- <p class="mt-3 text-xs text-gray-500">
                Chicharrones blog helvetica normcore iceland tousled brook viral
                artisan.
              </p> -->
            </div>
          </div>
        </section>
      </main>

      <footer hx-get="/static/html/footer.html" hx-trigger="load"></footer>
    </div>
  </body>
</html>
